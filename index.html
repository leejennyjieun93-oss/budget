const computeMonthly = (mode, principal, months, extra) => {
  if (mode === 'monthly') return Math.max(0, extra || 0);
  if (mode === 'fee')     return Math.max(0, (principal + (extra || 0)) / months);
  if (mode === 'apr') {
    const r = (extra || 0) / 12 / 100;
    if (r <= 0) return principal / months;
    return principal * (r * Math.pow(1+r, months)) / (Math.pow(1+r, months) - 1);
  }
  return principal / months;
};

function Donut({ pct, label, color, size }) {
  const r = size === 96 ? 38 : 29;
  const sw = size === 96 ? 8 : 6;
  const circ = 2 * Math.PI * r;
  const visualPct = Math.min(100, Math.max(0, pct));
  const offset = circ * (1 - visualPct / 100);
  const numFs = size === 96 ? 23 : 17;
  const lblFs = size === 96 ? 9.5 : 8.5;
  const parts = (label || '').split(' ');
  return (
    <div style={{ position:'relative', width:size, height:size, flex:'none' }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.16)" strokeWidth={sw}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeDasharray={circ.toFixed(1)} strokeDashoffset={offset.toFixed(1)} transform={`rotate(-90 ${size/2} ${size/2})`}/>
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
        <span style={{ fontSize: numFs, fontWeight:800, color:'#fff', lineHeight:1 }}>
          {pct}<span style={{ fontSize: numFs/2 }}>%</span>
        </span>
        <span style={{ fontSize: lblFs, color:'rgba(255,255,255,0.6)', marginTop:2, textAlign:'center', lineHeight:1.15 }}>
          {parts.map((p, i) => (<React.Fragment key={i}>{i>0 && <br/>}{p}</React.Fragment>))}
        </span>
      </div>
    </div>
  );
}

          <div style={{ fontSize: isDual ? 11 : 12, letterSpacing:'0.13em', textTransform:'uppercase', color:'rgba(255,255,255,0.55)', fontWeight:600, marginBottom:10 }}>{hero.kicker}</div>
          <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
            <span style={{ fontSize: isDual ? 17 : 19, fontWeight:600, color:'rgba(255,255,255,0.7)' }}>₩</span>
            <span style={{ fontSize: isDual ? 32 : 44, lineHeight:0.9, fontWeight:800, color:'#fff', letterSpacing:'-0.02em' }}>{hero.number}</span>
          </div>
          <div style={{ fontSize:12, color:'rgba(255,255,255,0.55)', marginTop:10 }}>
            {hero.subPre}<b style={{ color: hero.subAccentColor || '#D9B36A', fontWeight:700 }}>{hero.subAccent}</b>{hero.subPost}
          </div>
        </div>
        {isDual ? (
          <div style={{ display:'flex', gap:8 }}>
            <Donut pct={hero.dPct}  label={hero.dLabel}  color={hero.dColor  || '#D9B36A'} size={74}/>
            <Donut pct={hero.dPct2} label={hero.dLabel2} color={hero.dColor2 || '#C9817A'} size={74}/>
          </div>
        ) : (
          <Donut pct={hero.dPct} label={hero.dLabel} color={hero.dColor || '#D9B36A'} size={96}/>
        )}
      </div>
    </div>
  );
}

function BottomNav({ tab, setTab }) {
  const item = (key, label, Icon) => {
    const active = tab === key;
    return (
      <div onClick={() => setTab(key)} style={{ cursor:'pointer', flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:5, color: active ? '#233A2E' : '#b3ada2' }}>
        <Icon />
        <span style={{ fontSize:11, fontWeight: active ? 700 : 500 }}>{label}</span>
      </div>
    );
  };
  return (
    <div style={{ background:'#fff', borderTop:'1px solid #EFEBE1', display:'flex', padding:'10px 0 calc(env(safe-area-inset-bottom) + 10px)', position:'fixed', left:0, right:0, bottom:0, zIndex:5 }}>
      {item('record', '기록', ListIcon)}
      {item('installment', '할부', CardIcon)}
      {item('stats', '통계', ChartIcon)}
    </div>
  );
}

// ───────── main app ─────────
function App() {
  const [tab, setTab] = useState('record');
  const [sheet, setSheet] = useState(null);
  // Start empty; cloud fetch populates. INITIAL_DATA is offline fallback only — never auto-uploaded.
  const [records, setRecords] = useState([]);
  const [installments, setInstallments] = useState([]);
  const [settings, setSettings] = useState(INITIAL_SETTINGS);
  const [authState, setAuthState] = useState(supa ? 'connecting' : 'offline'); // connecting|unauthenticated|connected|empty|offline
  const [uid, setUid] = useState(null);
  const [loginEmail, setLoginEmail] = useState('');
  const [userEmail, setUserEmail] = useState(null);
  const [authPassword, setAuthPassword] = useState('');
  const [authError, setAuthError] = useState(null);
  const settingsDirty = useRef(false);

  const fetchCloud = async (userId) => {
    const [er, ir, sr] = await Promise.all([
      supa.from('entries').select('*').is('deleted_at', null).order('date', { ascending: false }),
      supa.from('installments').select('*').is('deleted_at', null),
      supa.from('settings').select('*').eq('user_id', userId).maybeSingle(),
    ]);
    const entries = er.data || [];
    const insts   = ir.data || [];
    const setRow  = sr.data || null;
    if (entries.length || insts.length || setRow) {
      setRecords(entries.map(cloudRecToLocal));
      setInstallments(insts.map(cloudInstToLocal));
      if (setRow) setSettings({
        challenge_start: setRow.challenge_start,
        budget_week:     setRow.budget_week  ?? INITIAL_SETTINGS.budget_week,
        budget_month:    setRow.budget_month ?? INITIAL_SETTINGS.budget_month,
      });
      setAuthState('connected');
    } else {
      setAuthState('empty');
    }
  };

  // Session check on boot — NEVER auto-login.
  useEffect(() => {
    if (!supa) {
      setRecords(INITIAL_RECORDS);
      setInstallments(INITIAL_INSTALLMENTS);
      return;
    }
    let cancelled = false;
    (async () => {
      try {
        const { data: sess } = await supa.auth.getSession();
        const user = sess?.session?.user;
        if (cancelled) return;
        if (user) {
          setUid(user.id);
          setUserEmail(user.email || null);
          await fetchCloud(user.id);
        } else {
          // No session — show local fallback, prompt login via settings.
          setRecords(INITIAL_RECORDS);
          setInstallments(INITIAL_INSTALLMENTS);
          setAuthState('unauthenticated');
        }
      } catch (e) {
        console.error('[cloud] init failed:', e);
        if (!cancelled) {
          setRecords(INITIAL_RECORDS);
          setInstallments(INITIAL_INSTALLMENTS);
          setAuthState('offline');
        }
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const doLogin = async () => {
    if (!supa) return;
    if (!loginEmail || !authPassword) { setAuthError('이메일과 비밀번호를 입력해주세요'); return; }
    setAuthError(null);
    const prevState = authState;
    setAuthState('connecting');
    try {
      const { data, error } = await supa.auth.signInWithPassword({ email: loginEmail, password: authPassword });
      if (error) throw error;
      setUid(data.user.id);
      setUserEmail(data.user.email || loginEmail);
      setAuthPassword('');
      await fetchCloud(data.user.id);
    } catch (e) {
      console.error('[cloud] login failed:', e);
      setAuthError(e?.message || String(e));
      setAuthState(prevState === 'connecting' ? 'unauthenticated' : prevState);
    }
  };

  const doLogout = async () => {
    if (!supa) return;
    await supa.auth.signOut();
    setUid(null);
    setUserEmail(null);
    setLoginEmail('');
    setAuthPassword('');
    setRecords(INITIAL_RECORDS);
    setInstallments(INITIAL_INSTALLMENTS);
    setSettings(INITIAL_SETTINGS);
    setAuthState('unauthenticated');
  };

  const cloudUpsertRecord = async (rec) => {
    if (!supa || !uid || (authState !== 'connected' && authState !== 'empty')) return;
    const { error } = await supa.from('entries').upsert(localRecToCloud(rec, uid));
    if (error) console.error('[cloud] upsert entry', error);
  };
  const cloudDeleteRecord = async (id) => {
    if (!supa || !uid || (authState !== 'connected' && authState !== 'empty')) return;
    const { error } = await supa.from('entries').update({ deleted_at: new Date().toISOString() }).eq('id', id);
    if (error) console.error('[cloud] soft-delete entry', error);
  };
  const cloudUpsertInstallment = async (it) => {
    if (!supa || !uid || (authState !== 'connected' && authState !== 'empty')) return;
    const { error } = await supa.from('installments').upsert(localInstToCloud(it, uid));
    if (error) console.error('[cloud] upsert installment', error);
  };
  const cloudDeleteInstallment = async (id) => {
    if (!supa || !uid || (authState !== 'connected' && authState !== 'empty')) return;
    const { error } = await supa.from('installments').update({ deleted_at: new Date().toISOString() }).eq('id', id);
    if (error) console.error('[cloud] soft-delete installment', error);
  };
  const cloudUpsertSettings = async (s) => {
    if (!supa || !uid || (authState !== 'connected' && authState !== 'empty')) return;
    const { error } = await supa.from('settings').upsert({
      user_id: uid,
      challenge_start: s.challenge_start,
      budget_week: s.budget_week,
      budget_month: s.budget_month,
    }, { onConflict: 'user_id' });
    if (error) console.error('[cloud] upsert settings', error);
  };
  // Debounced settings sync — skip first run (initial fetch already set them)
  useEffect(() => {
    if (!settingsDirty.current) { settingsDirty.current = true; return; }
    const t = setTimeout(() => cloudUpsertSettings(settings), 700);
    return () => clearTimeout(t);
  }, [settings, uid]);

  // Manual import: explicit user action. Uploads INITIAL_DATA (or current state) to cloud once.
  const importLocalToCloud = async () => {
    if (!supa || !uid) return;
    const seedRecords = records.length ? records : INITIAL_RECORDS;
    const seedInst    = installments.length ? installments : INITIAL_INSTALLMENTS;
    const seedSettings = settings;
    try {
      if (seedRecords.length) {
        const { error } = await supa.from('entries').upsert(seedRecords.map(r => localRecToCloud(r, uid)));
        if (error) throw error;
      }
      if (seedInst.length) {
        const { error } = await supa.from('installments').upsert(seedInst.map(it => localInstToCloud(it, uid)));
        if (error) throw error;
      }
      await cloudUpsertSettings(seedSettings);
      if (!records.length)     setRecords(seedRecords);
      if (!installments.length) setInstallments(seedInst);
      setAuthState('connected');
      alert('Cloud에 ' + seedRecords.length + '건 기록 + ' + seedInst.length + '건 할부 업로드 완료');
    } catch (e) {
      console.error('[cloud] import failed', e);
      alert('업로드 실패: ' + (e?.message || e));
    }
  };
  // input sheet
  const [seg, setSeg] = useState('spend');
  const [cat, setCat] = useState('식비');
  const [amount, setAmount] = useState('');
  const [splitTotal, setSplitTotal] = useState('');
  const [dumb, setDumb] = useState(false);
  const [split, setSplit] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editDate, setEditDate] = useState(null);
  const [editingFromAll, setEditingFromAll] = useState(false);
  const [memoDraft, setMemoDraft] = useState('');
  const [expandedDates, setExpandedDates] = useState([]);
  const [allLimit, setAllLimit] = useState(30);
  const [memoFocused, setMemoFocused] = useState(false);
  const [splitFocused, setSplitFocused] = useState(false);
  const [editingInstId, setEditingInstId] = useState(null);
  const [editInstDraft, setEditInstDraft] = useState(null);
  const [instMode, setInstMode] = useState('zero');
  // refs
  const memoRef       = useRef(null);
  const instNameRef   = useRef(null);
  const instPriceRef  = useRef(null);
  const instMonthsRef = useRef(null);
  const instExtraRef  = useRef(null);
  const instStartRef  = useRef(null);
  const restoreRef    = useRef(null);

  const resetInput = () => {
    setAmount(''); setSplitTotal('');
    setDumb(false); setSplit(false);
    setMemoDraft(''); setEditingId(null); setEditDate(null);
    setMemoFocused(false); setSplitFocused(false);
    setEditingInstId(null); setEditInstDraft(null);
  };
  const closeSheet = () => {
    if (sheet === 'input' && editingFromAll) {
      setSheet('allrecords');
      setEditingFromAll(false);
      resetInput();
    } else {
      setSheet(null);
      setEditingFromAll(false);
      resetInput();
    }
  };
  const goTab = (t) => { setTab(t); setSheet(null); setEditingFromAll(false); resetInput(); };

  const switchSeg = (next) => {
    setSeg(next);
    setCat(catsFor(next)[0]);
    if (next !== 'spend') { setDumb(false); setSplit(false); setSplitTotal(''); }
  };

  const pushKey = (k) => {
    setAmount(a => {
      if (k === '⌫') return a.slice(0, -1);
      if (a.length >= 9) return a;
      if (a === '' && (k === '0' || k === '000')) return a;
      return a + k;
    });
  };

  const openEdit = (id, fromAll = false) => {
    const r = records.find(x => x.id === id);
    if (!r) return;
    setEditingId(r.id);
    setEditDate(r.date);
    setSeg(r.type);
    setCat(r.cat);
    setAmount(String(r.amount));
    setDumb(!!r.dumb);
    const isSplit = r.paid != null;
    setSplit(isSplit);
    setSplitTotal(isSplit ? String(r.paid) : '');
    setMemoDraft(r.memo || '');
    setEditingFromAll(fromAll);
    setSheet('input');
  };

  const onSave = () => {
    const amt = Number(amount || 0);
    if (!amt) { closeSheet(); return; }
    const memo = memoRef.current?.value ?? memoDraft;
    const paid = split && seg === 'spend' ? Number(splitTotal || amt) : null;
    let saved;
    if (editingId) {
      saved = { ...(records.find(r => r.id === editingId) || {}), id: editingId,
        type: seg, cat, memo, amount: amt, paid, dumb: seg==='spend' && dumb,
        date: editDate || todayISO() };
      setRecords(records.map(r => r.id === editingId ? saved : r));
    } else {
      saved = { id: uuid(), type: seg, cat, memo, amount: amt, paid,
        date: todayISO(), dumb: seg === 'spend' && dumb };
      setRecords([saved, ...records]);
    }
    cloudUpsertRecord(saved);
    if (editingFromAll) {
      setSheet('allrecords');
      setEditingFromAll(false);
      resetInput();
    } else {
      setSheet(null);
      resetInput();
      setTab('record');
    }
  };

  const onDelete = () => {
    if (!editingId) return;
    if (!window.confirm('이 기록을 정말 삭제할까요?')) return;
    const id = editingId;
    setRecords(records.filter(r => r.id !== id));
    cloudDeleteRecord(id);
    if (editingFromAll) {
      setSheet('allrecords');
      setEditingFromAll(false);
      resetInput();
    } else {
      setSheet(null);
      resetInput();
    }
  };

  const openEditInst = (id) => {
    const it = installments.find(x => x.id === id);
    if (!it) return;
    setEditingInstId(id);
    setEditInstDraft({
      name: it.name,
      principal: String(it.principal),
      months: String(it.months),
      monthly: String(it.monthly),
      start_month: it.start_month,
    });
    setInstMode('monthly');
    setSheet('installment');
  };

  const onSaveInst = () => {
    const name = instNameRef.current?.value?.trim() || '';
    const principal = Number((instPriceRef.current?.value || '').replace(/[^0-9]/g, '')) || 0;
    const months = Math.max(1, Number((instMonthsRef.current?.value || '').replace(/[^0-9]/g, '')) || 1);
    const extra  = Number((instExtraRef.current?.value || '').replace(/[^0-9.]/g, '')) || 0;
    const start  = (instStartRef.current?.value || currentMonthISO()).slice(0,7);
    if (!name || (instMode !== 'monthly' && !principal)) { closeSheet(); return; }
    if (instMode === 'monthly' && !extra) { closeSheet(); return; }
    const monthly = Math.round(computeMonthly(instMode, principal, months, extra));
    const finalPrincipal = instMode === 'monthly' ? monthly * months : principal;
    let saved;
    if (editingInstId) {
      saved = { id: editingInstId, name, principal: finalPrincipal, months, monthly, start_month: start };
      setInstallments(installments.map(it => it.id === editingInstId ? saved : it));
    } else {
      saved = { id: uuid(), name, principal: finalPrincipal, months, monthly, start_month: start };
      setInstallments([...installments, saved]);
    }
    cloudUpsertInstallment(saved);
    [instNameRef, instPriceRef, instMonthsRef, instExtraRef, instStartRef].forEach(r => { if (r.current) r.current.value = ''; });
    setInstMode('zero');
    setEditingInstId(null);
    setEditInstDraft(null);
    setSheet(null);
  };

  const onDeleteInst = () => {
    if (!editingInstId) return;
    if (!window.confirm('이 할부를 정말 삭제할까요?')) return;
    const id = editingInstId;
    setInstallments(installments.filter(it => it.id !== id));
    cloudDeleteInstallment(id);
    setEditingInstId(null);
    setEditInstDraft(null);
    setSheet(null);
  };

  // Restore — supports new-format (spending+installments+budgets) and flat-records form
  const applyRestore = (mode) => {
    const raw = restoreRef.current?.value?.trim() || '';
    if (!raw) { closeSheet(); return; }
    let parsed;
    try { parsed = JSON.parse(raw); } catch { alert('JSON 형식이 올바르지 않아요'); return; }
    let inRecords = null;
    if (Array.isArray(parsed.records)) inRecords = parsed.records;
    else if (parsed.spending && typeof parsed.spending === 'object') inRecords = flattenSpending(parsed.spending);
    const inInst = Array.isArray(parsed.installments) ? mapInstallments(parsed.installments) : null;
    const inChal = parsed.challengeStart || parsed.challenge_start;
    const inBudW = parsed.budgets?.week  ?? parsed.budget_week;
    const inBudM = parsed.budgets?.month ?? parsed.budget_month;

    if (mode === 'replace') {
      if (inRecords) setRecords(inRecords);
      if (inInst)    setInstallments(inInst);
    } else {
      if (inRecords) setRecords([...inRecords, ...records]);
      if (inInst)    setInstallments([...installments, ...inInst]);
    }
    setSettings(s => ({
      ...s,
      challenge_start: inChal ?? s.challenge_start,
      budget_week:  inBudW != null ? Number(inBudW) : s.budget_week,
      budget_month: inBudM != null ? Number(inBudM) : s.budget_month,
    }));
    // mirror to cloud
    if (inRecords) inRecords.forEach(r => cloudUpsertRecord(r));
    if (inInst)    inInst.forEach(it => cloudUpsertInstallment(it));
    if (restoreRef.current) restoreRef.current.value = '';
    setSheet(null);
  };

  // ───────── derivations ─────────
  const TODAY = todayISO();
  const CM    = currentMonthISO();
  const [yy, mm] = CM.split('-').map(Number);
  const challengeStart = settings.challenge_start || `${CM}-01`;

  const monthRecords = records.filter(r => r.date && r.date.startsWith(CM));
  const exp = monthRecords.filter(r => r.type === 'spend');
  const inc = monthRecords.filter(r => r.type === 'income');
  const fix = monthRecords.filter(r => r.type === 'fixed');
  const totalSpend  = exp.reduce((a,r) => a + (r.amount||0), 0);
  const totalIncome = inc.reduce((a,r) => a + (r.amount||0), 0);
  const monthNet    = Math.max(0, totalSpend - totalIncome);
  const BUDGET      = settings.budget_month || 1;
  const budgetPct   = Math.min(100, monthNet / BUDGET * 100);

  // weekly: this ISO week (Mon → Sun, current day inclusive)
  const { weekStart, weekEnd } = (() => {
    const d = new Date(TODAY);
    const dow = d.getDay();                     // 0=Sun, 1=Mon, ..., 6=Sat
    const back = dow === 0 ? 6 : dow - 1;       // days back to Monday
    const ms = new Date(d); ms.setDate(d.getDate() - back);
    const me = new Date(ms); me.setDate(ms.getDate() + 6);
    const fmt = (x) => `${x.getFullYear()}-${pad2(x.getMonth()+1)}-${pad2(x.getDate())}`;
    return { weekStart: fmt(ms), weekEnd: fmt(me) };
  })();
  const weeklySpent = records.filter(r => r.type === 'spend' && r.date >= weekStart && r.date <= weekEnd).reduce((a,r) => a + r.amount, 0);
  const weeklyPct   = Math.min(100, weeklySpent / Math.max(1, settings.budget_week) * 100);

  // streak / no-spend up to today
  const noSpendCount = (() => {
    let n = 0;
    const start = new Date(challengeStart);
    const end = new Date(TODAY);
    for (let cursor = new Date(start); cursor <= end; cursor.setDate(cursor.getDate() + 1)) {
      const ds = `${cursor.getFullYear()}-${pad2(cursor.getMonth()+1)}-${pad2(cursor.getDate())}`;
      if (!records.some(r => r.date === ds && r.type === 'spend')) n++;
    }
    return n;
  })();
  const streak = (() => {
    let n = 0;
    const cursor = new Date(TODAY);
    while (true) {
      const ds = `${cursor.getFullYear()}-${pad2(cursor.getMonth()+1)}-${pad2(cursor.getDate())}`;
      if (ds < challengeStart) break;
      if (records.some(r => r.date === ds && r.type === 'spend')) break;
      n++;
      cursor.setDate(cursor.getDate() - 1);
    }
    return n;
  })();
  const daysElapsed = Math.max(1, Math.floor((new Date(TODAY) - new Date(challengeStart)) / 86400000) + 1);
  const achievePct = Math.max(0, Math.min(100, Math.round(noSpendCount / daysElapsed * 100)));

  // records list — current month, sort by date desc, top 10
  const records10 = monthRecords.slice().sort((a,b) => b.date.localeCompare(a.date)).slice(0, 10);
  const recordsVM = records10.map(r => {
    let tag='', tagBg='', tagColor='', hasTag=false;
    if (r.dumb)                  { tag='멍청소비'; tagBg='#F3DEDA'; tagColor='#B5564C'; hasTag=true; }
    else if (r.paid != null)     { tag='N빵';     tagBg='#E3E9E4'; tagColor='#3C5C4A'; hasTag=true; }
    else if (r.type === 'fixed') { tag='고정비'; tagBg='#EDE8DD'; tagColor='#8a7d5a'; hasTag=true; }
    else if (r.type === 'income'){ tag='수입';   tagBg='#E9EEE9'; tagColor='#2F6B4A'; hasTag=true; }
    return {
      id: r.id,
      dayText: Number(r.date.slice(-2)) + '일',
      cat: r.cat, memo: r.memo,
      hasTag, tag, tagBg, tagColor,
      amountText: (r.type === 'income' ? '+' : '−') + fmt(r.amount),
      amountColor: r.type === 'income' ? '#2F6B4A' : '#22201c',
    };
  });

  // calendar
  const monthDayCount = new Date(yy, mm, 0).getDate();
  const startDow = new Date(yy, mm - 1, 1).getDay();
  const calendar = [];
  for (let i=0;i<startDow;i++) calendar.push({ label:'', bg:'transparent', color:'transparent', weight:'400' });
  for (let d=1; d<=monthDayCount; d++) {
    const ds = `${CM}-${pad2(d)}`;
    let bg='#F2EFE7', color='#b3ada2', weight='500';
    const hasSpend = records.some(r => r.date === ds && r.type === 'spend');
    if (ds === TODAY)                  { bg='#D9B36A'; color='#3a2e10'; weight='800'; }
    else if (hasSpend)                 { bg='#F3DEDA'; color='#B5564C'; weight='600'; }
    else if (ds < challengeStart)      { bg='#F7F5EF'; color='#cfc9bc'; weight='400'; }
    else if (ds <= TODAY)              { bg='#233A2E'; color='#fff';    weight='700'; }
    else                               { bg='#F7F5EF'; color='#cfc9bc'; weight='400'; }
    calendar.push({ label:String(d), bg, color, weight });
  }

  // dumb report
  const dumbItems = exp.filter(r => r.dumb);
  const dumbTotal = dumbItems.reduce((a,r) => a + r.amount, 0);
  const dumbItemsVM = dumbItems.map(r => ({ label: r.cat + ' · ' + (r.memo||''), amountText: fmt(r.amount) }));

  // category bars
  const byCat = {};
  exp.forEach(r => { byCat[r.cat] = (byCat[r.cat]||0) + r.amount; });
  const catArr = Object.entries(byCat).sort((a,b) => b[1]-a[1]);
  const maxCat = catArr.length ? catArr[0][1] : 1;
  const catBars = catArr.map(([name,v]) => ({ name, amountText: fmt(v), pct: (v/maxCat*100).toFixed(1)+'%' }));

  // fixed bars
  const byFix = {};
  fix.forEach(r => { byFix[r.cat] = (byFix[r.cat]||0) + r.amount; });
  const fixArr = Object.entries(byFix).sort((a,b) => b[1]-a[1]);
  const totalFix = fixArr.reduce((a,[,v]) => a + v, 0);
  const maxFix   = fixArr.length ? fixArr[0][1] : 1;
  const fixedBars = fixArr.map(([name,v]) => ({
    name,
    amountText: fmt(v),

                    style={{ width:120, textAlign:'right', border:'1px solid #E6E1D6', borderRadius:10, padding:'7px 10px', fontSize:13, color:'#22201c', fontWeight:700, outline:'none' }}

                      {authState === 'unauthenticated' && '로컬 전용 (로그인 필요)'}
                      {authState === 'offline'         && '오프라인'}
                    </div>
                  </div>

                    fontSize:11, fontWeight:700, padding:'4px 9px', borderRadius:8,

                    autoComplete="username"
                    placeholder="이메일"
                    value={loginEmail}
                    onChange={e => setLoginEmail(e.target.value)}

                  <input

                  { label:'내보내기 (파일)', onClick: () => {
                      const payload = JSON.stringify({
                        spending: records.reduce((acc, r) => {
                          (acc[r.date] = acc[r.date] || { items: [] }).items.push({ ...r, date: undefined });
                          return acc;
                        }, {}),
                        installments: installments.map(it => ({ id: it.id, name: it.name, principal: it.principal, months: it.months, monthly: it.monthly, start: it.start_month })),
                        challengeStart: settings.challenge_start,
                        budgets: { week: settings.budget_week, month: settings.budget_month },
                        version: 6,
                      }, null, 2);
                      const blob = new Blob([payload], { type:'application/json' });
                      const a = document.createElement('a');
                      a.href = URL.createObjectURL(blob);
                      a.download = 'no-spend-budget-backup.json';
                      a.click();
                      URL.revokeObjectURL(a.href);
                    } },
                  { label:'불러오기 (복원)', onClick: () => {

                      inp.type = 'file'; inp.accept = 'application/json';

                        const f = inp.files?.[0]; if (!f) return;
                        const fr = new FileReader();
                        fr.onload = () => {
                          try {
                            const p = JSON.parse(String(fr.result || ''));
                            let inRecords = null;
                            if (Array.isArray(p.records)) inRecords = p.records;
                            else if (p.spending) inRecords = flattenSpending(p.spending);
                            if (inRecords) setRecords(inRecords);
                            if (Array.isArray(p.installments)) setInstallments(mapInstallments(p.installments));
                            setSettings(s => ({
                              ...s,
                              challenge_start: p.challengeStart ?? p.challenge_start ?? s.challenge_start,
                              budget_week:  p.budgets?.week  ?? p.budget_week  ?? s.budget_week,
                              budget_month: p.budgets?.month ?? p.budget_month ?? s.budget_month,
                            }));
                            setSheet(null);
                          } catch { alert('JSON 형식이 올바르지 않아요'); }
                        };
                        fr.readAsText(f);
                      };
                      inp.click();
                    } },
                  { label:'텍스트로 복원하기', onClick: () => setSheet('restore') },

              <div style={{ width:40, height:4, borderRadius:2, background:'#d8d2c5', margin:'0 auto 16px', flex:'none' }}></div>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14, flex:'none' }}>
                <span style={{ fontSize:18, fontWeight:700, color:'#22201c' }}>텍스트로 복원</span>
                <span onClick={closeSheet} style={{ cursor:'pointer', fontSize:14, color:'#8a857c' }}>취소</span>
              </div>
              <div style={{ fontSize:12, color:'#a39d92', marginBottom:10, lineHeight:1.5, flex:'none' }}>
                spending+installments+budgets 형식, 또는 평면 records 배열 둘 다 인식해요. 합치기는 prepend, 교체는 통째로 덮어써요.
              </div>
              <textarea
                ref={restoreRef}
                placeholder='{"spending":{"2026-06-20":{"items":[{"id":"...","amount":3000,"paid":null,"memo":"...","cat":"식비","type":"spend","dumb":false}]}},"installments":[],"challengeStart":"2026-06-01","budgets":{"week":150000,"month":600000}}'
                style={{ width:'100%', flex:1, minHeight:160, border:'none', background:'#fff', borderRadius:14, padding:'14px 16px', fontSize:13, color:'#22201c', fontFamily:'ui-monospace, monospace', outline:'none', resize:'none', marginBottom:12 }}
              />
              <div style={{ display:'flex', gap:8, flex:'none' }}>
                <div onClick={() => applyRestore('merge')}   style={{ cursor:'pointer', flex:1, background:'#fff', color:'#233A2E', textAlign:'center', padding:16, borderRadius:15, fontSize:16, fontWeight:700, border:'1px solid #E6E1D6' }}>합치기</div>
                <div onClick={() => applyRestore('replace')} style={{ cursor:'pointer', flex:1, background:'#233A2E', color:'#fff', textAlign:'center', padding:16, borderRadius:15, fontSize:16, fontWeight:700 }}>교체</div>
              </div>
            </div>
          </>
        )}

        {/* ============ ALL RECORDS SHEET (date-grouped accordion) ============ */}
        {sheet === 'allrecords' && (() => {
          const DOW = ['일','월','화','수','목','금','토'];
          const tagOf = (r) => {
            if (r.dumb)              return { tag:'멍청소비', tagBg:'#F3DEDA', tagColor:'#B5564C' };
            if (r.paid != null)      return { tag:'N빵',     tagBg:'#E3E9E4', tagColor:'#3C5C4A' };
            if (r.type === 'fixed')  return { tag:'고정비', tagBg:'#EDE8DD', tagColor:'#8a7d5a' };
            if (r.type === 'income') return { tag:'수입',   tagBg:'#E9EEE9', tagColor:'#2F6B4A' };
            return null;
          };
          // group by date desc
          const dayMap = new Map();
          for (const r of records) {
            if (!r.date) continue;
            if (!dayMap.has(r.date)) dayMap.set(r.date, []);
            dayMap.get(r.date).push(r);
          }
          const allDays = [...dayMap.entries()].sort((a,b) => b[0].localeCompare(a[0]));
          const totalDays = allDays.length;
          const dayGroups = allDays.slice(0, allLimit).map(([date, items]) => {
            const spendTotal  = items.filter(r => r.type === 'spend').reduce((a,r) => a + r.amount, 0);
            const incomeTotal = items.filter(r => r.type === 'income').reduce((a,r) => a + r.amount, 0);
            const fixedTotal  = items.filter(r => r.type === 'fixed').reduce((a,r) => a + r.amount, 0);
            const dumbTotal   = items.filter(r => r.dumb).reduce((a,r) => a + r.amount, 0);
            const net = incomeTotal - spendTotal - fixedTotal;
            return { date, items, spendTotal, incomeTotal, fixedTotal, dumbTotal, net };
          });
          const toggle = (d) => setExpandedDates(prev => prev.includes(d) ? prev.filter(x => x !== d) : [...prev, d]);
          const removeRecord = (id) => {
            if (!window.confirm('이 기록을 삭제할까요?')) return;
            setRecords(records.filter(r => r.id !== id));
            cloudDeleteRecord(id);
          };
          return (
            <>
              <div onClick={closeSheet} style={{ position:'fixed', inset:0, background:'rgba(20,18,14,0.4)', zIndex:20 }}></div>
              <div style={{ position:'fixed', left:0, right:0, top:0, bottom:0, background:'#F6F4EF', zIndex:21, display:'flex', flexDirection:'column' }}>
                <div style={{ flex:'none', padding:'max(20px, calc(env(safe-area-inset-top) + 16px)) 22px 14px', background:'#fff', borderBottom:'1px solid #EFEBE1', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <span style={{ fontSize:18, fontWeight:700, color:'#22201c' }}>전체 기록</span>
                  <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                    <span style={{ fontSize:12, color:'#a39d92' }}>{totalDays}일 · {records.length}건</span>
                    <span onClick={closeSheet} style={{ cursor:'pointer', fontSize:14, color:'#233A2E', fontWeight:700 }}>닫기</span>
                  </div>
                </div>
                <div className="app-scroll" style={{ flex:1, overflowY:'auto', minHeight:0, padding:'12px 16px calc(env(safe-area-inset-bottom) + 24px)' }}>
                  {dayGroups.length === 0 && (
                    <div style={{ padding:'40px 22px', textAlign:'center', color:'#a39d92', fontSize:14 }}>기록이 아직 없어요.</div>
                  )}
                  {dayGroups.map((g) => {
                    const [yy, mm, dd] = g.date.split('-').map(Number);
                    const dow = new Date(yy, mm-1, dd).getDay();
                    const expanded = expandedDates.includes(g.date);
                    const totalColor = g.net > 0 ? '#2F6B4A' : g.net < 0 ? '#C9817A' : '#a39d92';
                    const totalSign  = g.net > 0 ? '+' : g.net < 0 ? '−' : '';
                    const totalAbs   = Math.abs(g.net);
                    return (
                      <div key={g.date} style={{ background:'#fff', borderRadius:16, marginBottom:8, overflow:'hidden' }}>
                        {/* day header row */}
                        <div onClick={() => toggle(g.date)} style={{ cursor:'pointer', display:'flex', alignItems:'center', gap:10, padding:'14px 16px' }}>
                          <span style={{ fontSize:13, color:'#a39d92', width:14, textAlign:'center', transform: expanded ? 'rotate(90deg)' : 'rotate(0deg)', transition:'transform .15s' }}>▸</span>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
                              <span style={{ fontSize:14.5, fontWeight:700, color:'#22201c' }}>{mm}/{dd}</span>
                              <span style={{ fontSize:12.5, color:'#8a857c' }}>({DOW[dow]}) · {g.items.length}건</span>
                            </div>
                          </div>
                          {g.dumbTotal > 0 && (
                            <span style={{ fontSize:11.5, fontWeight:700, padding:'3px 8px', borderRadius:8, background:'#F3DEDA', color:'#B5564C', whiteSpace:'nowrap' }}>
                              😅 {fmt(g.dumbTotal)}
                            </span>
                          )}
                          <span style={{ fontSize:15, fontWeight:800, color: totalColor, whiteSpace:'nowrap' }}>{totalSign}{fmt(totalAbs)}</span>
                        </div>
                        {/* expanded records */}
                        {expanded && (
                          <div style={{ borderTop:'1px solid #F1EDE3', background:'#FAF8F2' }}>
                            {g.items.map((r, i) => {
                              const t = tagOf(r);
                              const amountColor = r.type === 'income' ? '#2F6B4A' : '#22201c';
                              const sign = r.type === 'income' ? '+' : '−';
                              return (
                                <div key={r.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 16px 12px 40px', borderBottom: i < g.items.length-1 ? '1px solid #F1EDE3' : 'none' }}>
                                  <div style={{ flex:1, minWidth:0 }}>
                                    <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:2 }}>
                                      <span style={{ fontSize:13.5, fontWeight:600, color:'#22201c' }}>{r.cat}</span>
                                      {t && (
                                        <span style={{ fontSize:10, fontWeight:700, padding:'2px 7px', borderRadius:6, background:t.tagBg, color:t.tagColor }}>{t.tag}</span>
                                      )}
                                    </div>
                                    <div style={{ fontSize:12, color:'#8a857c', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.memo}</div>
                                  </div>
                                  <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:6, flex:'none' }}>
                                    <span style={{ fontSize:14.5, fontWeight:700, color:amountColor }}>{sign}{fmt(r.amount)}</span>
                                    <div style={{ display:'flex', gap:10 }}>
                                      <span onClick={(e) => { e.stopPropagation(); openEdit(r.id, true); }} style={{ cursor:'pointer', fontSize:11.5, color:'#233A2E', fontWeight:600 }}>수정</span>
                                      <span onClick={(e) => { e.stopPropagation(); removeRecord(r.id); }} style={{ cursor:'pointer', fontSize:11.5, color:'#C9817A', fontWeight:600 }}>삭제</span>
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                  {totalDays > allLimit && (
                    <div onClick={() => setAllLimit(allLimit + 30)} style={{ cursor:'pointer', background:'#fff', border:'1px solid #E6E1D6', borderRadius:14, padding:14, textAlign:'center', marginTop:6 }}>
                      <span style={{ fontSize:13.5, fontWeight:700, color:'#233A2E' }}>더 보기 ({totalDays - allLimit}일 남음)</span>
                    </div>
                  )}
                </div>
              </div>
            </>
          );
        })()}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
